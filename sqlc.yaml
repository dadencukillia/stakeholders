version: "2"
sql:
  - engine: "postgresql"
    queries: "shared/db/queries"
    schema: "shared/db/migrations"
    gen:
      go:
        package: "sqlc"
        out: "shared/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
